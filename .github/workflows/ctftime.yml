name: CTFTime

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache CTFTime
        uses: actions/cache@v4
        with:
          path: ctftime_cache
          key: ${{ runner.os }}-ctftime-cache
          restore-keys: |
            ${{ runner.os }}-ctftime-cache

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CTFTime Bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DiscordWebhookUrl }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Secret DiscordWebhookUrl introuvable."
            exit 1
          fi

          python CTFtimeDiscordHooks.py \
            -w "$DISCORD_WEBHOOK_URL" \
            -d 10 \
            -c ctftime_cache
